@if (visible()) {
  <section
    class="pwa-update-sheet"
    role="region"
    aria-live="polite"
    aria-label="Nueva versión disponible"
  >
    <div class="update-copy">
      <h2 class="sheet-title">Nueva versión disponible</h2>
      <p class="sheet-description">Hay mejoras y correcciones listas para ti.</p>
      @if (updateVersionLabel(); as versionLabel) {
        <p class="sheet-version">Versión nueva: {{ versionLabel }}</p>
      }
    </div>
    @if (isUpdating()) {
      <div class="updating-status" role="status" aria-live="polite">
        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
        <span>Actualizando...</span>
      </div>
    } @else {
      <div class="sheet-actions">
        <button
          type="button"
          class="btn btn-outline-secondary sheet-button"
          (click)="onDismissClick()"
        >
          Más tarde
        </button>

        <button
          type="button"
          class="btn btn-primary sheet-button"
          (click)="onAcceptClick()"
        >
          Actualizar ahora
        </button>
      </div>
    }
  </section>
}
