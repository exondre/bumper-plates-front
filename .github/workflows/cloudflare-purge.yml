name: Cloudflare Purge after Firebase deploy

on:
  workflow_run:
    workflows: ["Deploy to Firebase Hosting"]
    types: [completed]

concurrency:
  group: gh-pages-purge
  cancel-in-progress: true

jobs:
  purge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare cache by hosts
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE }}
          CF_API_TOKEN: ${{ secrets.CF_CACHE_PURGE_TOKEN }}
          CF_PURGE_HOSTS: ${{ secrets.CF_PURGE_HOSTS }}
        run: |
          echo "Purging cache for hosts: ${CF_PURGE_HOSTS}"

          for i in 1 2 3; do
            curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"hosts\": ${CF_PURGE_HOSTS}}" && break
            echo "Retry $i..."; sleep 3
          done
